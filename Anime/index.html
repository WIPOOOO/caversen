<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anime — Caversen Print</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --bg-dark: #000000;
      --glass: rgba(255, 255, 255, 0.03); 
      --glass-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1); 
      --text: #f0ece4; 
      --muted: #888; 
    }
    
    @keyframes pageFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    body { 
      background-color: var(--bg-dark);
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      line-height: 1.6;
      animation: pageFade 0.6s ease-in-out;
      overflow-x: hidden;
      transition: opacity 0.5s ease-in-out;
    }

    .fade-out { opacity: 0; }

    header { 
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.2); 
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 10px 40px; 
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center; 
      border-bottom: 1px solid var(--border); 
      z-index: 1000;
    }

    .header-left { display: flex; justify-content: flex-start; }

    .back-arrow { 
      text-decoration: none; 
      color: var(--text); 
      font-size: 20px; 
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: 0.3s;
    }
    .back-arrow:hover { transform: translateX(-5px); opacity: 0.6; }

    /* Fix: Added pointer cursor for the logo */
    .logo { cursor: pointer; display: block; }
    .logo img { height: 78px; width: auto; display: block; }

    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 19px; transition: 0.3s; text-decoration: none; }
    .header-socials a:hover { color: var(--text); }

    main { 
      padding: 160px 40px 60px; 
      max-width: 1400px; 
      margin: 0 auto; 
    }
    
    .page-title { 
      font-size: 14px; 
      font-weight: 300; 
      letter-spacing: 6px; 
      text-transform: uppercase; 
      margin-bottom: 50px; 
      color: var(--muted);
      text-align: center;
    }

    .gallery { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 20px; 
    }

    .gallery-item { 
      background: var(--glass); 
      border: 1px solid var(--border); 
      border-radius: 15px; 
      backdrop-filter: blur(10px);
      overflow: hidden;
      cursor: zoom-in;
      transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .gallery-item:hover { 
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.7);
    }

    .gallery-item img { width: 100%; display: block; }

    .lightbox { 
      display: none; 
      position: fixed; 
      inset: 0; 
      background: rgba(0, 0, 0, 0.95); 
      z-index: 2000; 
      align-items: center; 
      justify-content: center; 
      backdrop-filter: blur(8px);
    }

    .lightbox.open { display: flex; animation: pageFade 0.3s ease; }
    .lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; }

    .close-lightbox {
      position: absolute;
      top: 30px;
      right: 40px;
      color: white;
      font-size: 35px;
      cursor: pointer;
      opacity: 0.5;
      transition: 0.3s;
    }
    .close-lightbox:hover { opacity: 1; }

    footer { 
      padding: 40px 20px; 
      text-align: center;
      font-size: 10px; 
      color: var(--muted); 
      letter-spacing: 2.5px; 
      border-top: 1px solid var(--border);
    }

    @media (max-width: 800px) { 
        .gallery { grid-template-columns: repeat(2, 1fr); }
        header { padding: 10px 20px; }
        .logo img { height: 60px; }
        main { padding-top: 130px; }
    }
    @media (max-width: 500px) { .gallery { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="back-arrow" onclick="smoothBack()"><i class="fa-solid fa-chevron-left"></i></a>
  </div>
  
  <div class="logo" onclick="smoothBack()">
    <img src="../logo.png" alt="Logo">
  </div>
  
  <div class="header-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="page-title">Anime Collection</h1>
  <div class="gallery" id="gallery"></div>
</main>

<footer>
  <p>© 2026 CAVERSEN PRINT — MOROCCO</p>
</footer>

<div class="lightbox" id="lightbox">
  <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img" src="">
</div>

<script>
  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const maxImages = 100; 

  function smoothBack() {
    document.body.classList.add('fade-out');
    setTimeout(() => {
      window.location.href = '../index.html';
    }, 500);
  }

  for (let i = 1; i <= maxImages; i++) {
    const fileName = `${i}.png`;
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = `<img src="${fileName}" alt="Print ${i}" loading="lazy">`;
    
    item.onclick = () => {
      lightboxImg.src = fileName;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    };
    
    const imgTest = new Image();
    imgTest.src = fileName;
    imgTest.onload = () => gallery.appendChild(item);
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = 'auto';
  }

  lightbox.onclick = (e) => {
    if (e.target === lightbox) closeLightbox();
  };
</script>

</body>
</html>
