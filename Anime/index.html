<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anime — Caversen Print</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #c8a97e;
      --text: #f0ece4;
      --muted: #5a5550;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 40px 40px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .back {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back:hover { color: var(--text); }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }

    main {
      position: relative;
      z-index: 1;
      padding: 50px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 8vw, 96px);
      letter-spacing: 0.03em;
      line-height: 0.9;
      margin-bottom: 8px;
    }

    .page-meta {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 48px;
    }

    .gallery {
      columns: 3;
      column-gap: 3px;
    }

    @media (max-width: 900px) { .gallery { columns: 2; } }
    @media (max-width: 500px) { .gallery { columns: 1; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 3px;
      position: relative;
      overflow: hidden;
      cursor: zoom-in;
      background: var(--surface);
    }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
      opacity: 0;
    }

    .gallery-item img.loaded { opacity: 1; }

    .gallery-item:hover img { transform: scale(1.04); }

    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }

    .gallery-item:hover .overlay { opacity: 1; }

    .overlay-text {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* ─── FOOTER ─── */
    footer {
      padding: 40px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .footer-info p {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .footer-socials { display: flex; gap: 20px; }
    
    .footer-socials a {
      color: var(--muted);
      font-size: 20px;
      transition: 0.3s;
      text-decoration: none;
    }

    .footer-socials a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      footer { flex-direction: column; text-align: center; gap: 20px; }
    }

    /* ─── LIGHTBOX ─── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
      cursor: zoom-out;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
    }

    .lightbox-close {
      position: fixed;
      top: 24px;
      right: 30px;
      font-size: 32px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
    }
  </style>
</head>
<body>

<header>
  <a class="back" href="../index.html">
    <span>←</span> All Collections
  </a>
  <a class="logo" href="../index.html">Caversen<span>.</span>Print</a>
</header>

<main>
  <h1 class="page-title">Anime</h1>
  <p class="page-meta">Caversen Print — Collection</p>

  <div class="gallery" id="gallery">
    <div class="gallery-item" onclick="openLightbox(this)">
      <img src="https://placehold.co/600x800/111111/c8a97e?text=Anime+01" alt="Anime Print 01" loading="lazy" onload="this.classList.add('loaded')" style="opacity:1"/>
      <div class="overlay"><span class="overlay-text">Anime Print 01</span></div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-info">
    <p>© 2025 CAVERSEN PRINT</p>
    <p>MOROCCO — FREE SHIPPING NATIONWIDE</p>
  </div>
  <div class="footer-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</footer>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt=""/>
</div>

<script>
  function openLightbox(item) {
    const img = item.querySelector('img');
    document.getElementById('lightbox-img').src = img.src;
    document.getElementById('lightbox-img').alt = img.alt;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>

</body>
</html>
