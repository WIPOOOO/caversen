<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anime — Caversen Print</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --bg-dark: #000000;
      --glass: rgba(255, 255, 255, 0.03); 
      --glass-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1); 
      --text: #f0ece4; 
      --muted: #888; 
    }
    
    body { 
      background-color: var(--bg-dark);
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      line-height: 1.6;
    }

    /* Fixed Header Strategy */
    header { 
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 10px 40px; 
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center; 
      border-bottom: 1px solid var(--border); 
      z-index: 1000;
    }

    .back-btn { 
      text-decoration: none; 
      color: var(--muted); 
      font-size: 11px; 
      letter-spacing: 2px; 
      text-transform: uppercase; 
      transition: 0.3s;
    }
    .back-btn:hover { color: var(--text); }

    .logo img { height: 68px; width: auto; display: block; }

    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 19px; transition: 0.3s; text-decoration: none; }
    .header-socials a:hover { color: var(--text); }

    /* Spacer to prevent content from hiding under fixed header */
    main { 
      padding: 140px 40px 60px; 
      max-width: 1400px; 
      margin: 0 auto; 
    }
    
    .page-title { 
      font-size: 17px; 
      font-weight: 300; 
      letter-spacing: 5.5px; 
      text-transform: uppercase; 
      margin-bottom: 50px; 
      color: var(--muted);
      text-align: center;
    }

    .gallery { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 20px; 
    }

    .gallery-item { 
      background: var(--glass); 
      border: 1px solid var(--border); 
      border-radius: 15px; 
      backdrop-filter: blur(10px);
      overflow: hidden;
      cursor: zoom-in;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .gallery-item:hover { 
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-5px);
    }

    .gallery-item img { 
      width: 100%; 
      display: block; 
      transition: opacity 0.3s;
    }
    
    footer { 
      padding: 40px 20px; 
      text-align: center;
      font-size: 11px; 
      color: var(--muted); 
      letter-spacing: 2.5px; 
      border-top: 1px solid var(--border);
    }

    .lightbox { 
      display: none; 
      position: fixed; 
      inset: 0; 
      background: rgba(0,0,0,0.95); 
      z-index: 2000; 
      align-items: center; 
      justify-content: center; 
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
    
    @media (max-width: 1100px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 800px) { 
        .gallery { grid-template-columns: repeat(2, 1fr); }
        header { padding: 10px 20px; }
        .logo img { height: 60px; }
        main { padding-top: 110px; }
    }
    @media (max-width: 500px) { .gallery { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <a class="back-btn" href="../index.html">← Back</a>
  <a class="logo" href="../index.html">
    <img src="../logo.png" alt="Logo">
  </a>
  <div class="header-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="page-title">Anime</h1>
  <div class="gallery" id="gallery"></div>
</main>

<footer>
  <p>© 2026 Caversen Print</p>
</footer>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="">
</div>

<script>
  const gallery = document.getElementById('gallery');
  const maxImages = 100; 

  for (let i = 1; i <= maxImages; i++) {
    const fileName = `${i}.png`;
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = `<img src="${fileName}" alt="Print ${i}" loading="lazy">`;
    item.onclick = () => openLightbox(fileName);
    
    // Check if image exists before appending
    const imgTest = new Image();
    imgTest.src = fileName;
    imgTest.onload = () => gallery.appendChild(item);
  }

  function openLightbox(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = src;
    lb.classList.add('open');
  }
</script>

</body>
</html>
