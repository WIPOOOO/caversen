<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collection — Caversen Print</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --bg-dark: #000000;
      --glass: rgba(255, 255, 255, 0.04); 
      --glass-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1); 
      --text: #f0ece4; 
      --muted: #888; 
    }

    html { 
      /* Reserve space to match the main page layout */
      scrollbar-gutter: stable; 
    }
    
    /* CUSTOM THIN SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }

    body { 
      background-color: var(--bg-dark);
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      line-height: 1.6;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    header { 
      position: fixed; 
      top: 0; 
      left: 0; 
      /* 100vw ignores scrollbar width to keep logo perfectly centered */
      width: 100vw; 
      background: rgba(0, 0, 0, 0.7); 
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px); 
      padding: 10px 40px; 
      display: grid; 
      grid-template-columns: 1fr 1fr 1fr; 
      align-items: center; 
      border-bottom: 1px solid var(--border); 
      z-index: 1000;
    }

    .header-left { display: flex; justify-content: flex-start; }

    .back-arrow { 
      text-decoration: none; color: var(--text); font-size: 20px; 
      display: flex; align-items: center; justify-content: center;
      padding: 20px; margin-left: -20px; transition: 0.2s;
    }
    .back-arrow:hover { transform: translateX(-4px); opacity: 0.6; }
    .back-arrow:active { transform: scale(0.9); }

    .logo { display: flex; justify-content: center; text-decoration: none; }
    .logo img { height: 78px; width: auto; display: block; }

    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 19px; transition: 0.3s; text-decoration: none; }
    .header-socials a:hover { color: var(--text); }

    main { padding: 160px 40px 60px; max-width: 1400px; margin: 0 auto; }
    
    .page-title { 
      font-size: 13px; font-weight: 300; letter-spacing: 6px; 
      text-transform: uppercase; margin-bottom: 50px; 
      color: var(--muted); text-align: center;
    }

    .gallery { 
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; 
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .gallery-item { 
      background: var(--glass); border: 1px solid var(--border); 
      border-radius: 12px; overflow: hidden; cursor: zoom-in;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .gallery-item:hover { 
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-6px);
      background: var(--glass-hover);
    }

    .gallery-item img { width: 100%; display: block; transition: 0.5s ease; }
    .gallery-item:hover img { transform: scale(1.03); }

    .lightbox {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.96); backdrop-filter: blur(10px);
      display: none; justify-content: center; align-items: center;
      z-index: 2000; cursor: zoom-out;
    }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90%; max-height: 85%; border-radius: 4px; }

    .close-lightbox { position: absolute; top: 30px; right: 40px; color: white; font-size: 35px; cursor: pointer; }

    #backToTop {
      position: fixed; bottom: 30px; right: 30px; width: 45px; height: 45px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text); border-radius: 50%; display: flex;
      justify-content: center; align-items: center; cursor: pointer;
      opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1500;
    }
    #backToTop.show { opacity: 1; visibility: visible; }
    #backToTop:hover { background: var(--glass-hover); border-color: white; }

    footer { padding: 40px 20px; text-align: center; font-size: 9px; color: var(--muted); letter-spacing: 3px; border-top: 1px solid var(--border); }

    @media (max-width: 900px) { 
      .gallery { grid-template-columns: repeat(2, 1fr); } 
      header { padding: 10px 20px; width: 100%; } /* Mobile often handles 100% better */
      .logo img { height: 60px; } 
      main { padding-top: 130px; } 
    }
    @media (max-width: 500px) { .gallery { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="back-arrow" href="../index.html"><i class="fa-solid fa-chevron-left"></i></a>
  </div>
  <a class="logo" href="../index.html">
    <img src="../logo.png" alt="Logo">
  </a>
  <div class="header-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="page-title">Collection</h1>
  <div class="gallery" id="gallery"></div>
</main>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="close-lightbox">&times;</span>
  <img id="lightbox-img" src="" alt="View Print" onclick="event.stopPropagation()">
</div>

<div id="backToTop" onclick="scrollToTop()"><i class="fa-solid fa-chevron-up"></i></div>

<footer><p>© 2026 CAVERSEN PRINT — MOROCCO</p></footer>

<script>
  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const backToTop = document.getElementById('backToTop');
  const maxImages = 100; 

  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = 'auto';
  }

  window.onscroll = () => {
    if (window.scrollY > 400) backToTop.classList.add('show');
    else backToTop.classList.remove('show');
  };

  function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

  for (let i = 1; i <= maxImages; i++) {
    const fileName = `${i}.png`;
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = `<img src="${fileName}" alt="Print ${i}" loading="lazy">`;
    item.onclick = () => openLightbox(fileName);
    
    const img = new Image();
    img.src = fileName;
    img.onload = () => gallery.appendChild(item);
  }
</script>
</body>
</html>
