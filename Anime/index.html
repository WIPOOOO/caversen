<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anime — Caversen Print</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e; --accent: #c8a97e; --text: #f0ece4; --muted: #5a5550; }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); background-size: 150px; pointer-events: none; z-index: 0; opacity: 0.5; }
    header { position: relative; z-index: 1; padding: 40px 40px 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .back { text-decoration: none; color: var(--muted); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; transition: color 0.2s; }
    .back:hover { color: var(--text); }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.04em; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    main { position: relative; z-index: 1; padding: 50px 40px; max-width: 1200px; margin: 0 auto; }
    .page-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 8vw, 96px); letter-spacing: 0.03em; line-height: 0.9; margin-bottom: 48px; }
    .gallery { columns: 3; column-gap: 3px; }
    .gallery-item { break-inside: avoid; margin-bottom: 3px; position: relative; overflow: hidden; cursor: zoom-in; background: var(--surface); animation: fadeUp 0.4s ease both; }
    .gallery-item img { width: 100%; display: block; transition: transform 0.4s; }
    .gallery-item:hover img { transform: scale(1.04); }
    .gallery-item .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%); opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; padding: 16px; }
    .gallery-item:hover .overlay { opacity: 1; }
    .overlay-text { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text); }
    footer { border-top: 1px solid var(--border); padding: 40px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 1; }
    .footer-info p { font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
    .footer-socials { display: flex; gap: 24px; }
    .footer-socials a { color: var(--muted); font-size: 20px; transition: 0.3s; text-decoration: none; }
    .footer-socials a:hover { color: var(--accent); transform: translateY(-3px); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; align-items: center; justify-content: center; cursor: zoom-out; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
  </style>
</head>
<body>

<header>
  <a class="back" href="../index.html">← All Collections</a>
  <a class="logo" href="../index.html">Caversen<span>.</span>Print</a>
</header>

<main>
  <h1 class="page-title">Anime</h1>
  <div class="gallery">
    <div class="gallery-item" onclick="openLightbox(this)">
      <img src="1.png" alt="Anime 01">
      <div class="overlay"><span class="overlay-text">Anime 01</span></div>
    </div>
    <div class="gallery-item" onclick="openLightbox(this)">
      <img src="2.png" alt="Anime 02">
      <div class="overlay"><span class="overlay-text">Anime 02</span></div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-info">
    <p>© 2025 Caversen Print</p>
    <p>Morocco — Free Shipping Nationwide</p>
  </div>
  <div class="footer-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</footer>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  function openLightbox(item) {
    document.getElementById('lightbox-img').src = item.querySelector('img').src;
    document.getElementById('lightbox').classList.add('open');
  }
</script>

</body>
</html>
