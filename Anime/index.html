<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"/>
  <title>Anime — Caversen Print</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --bg-dark: #000000;
      --glass: rgba(255, 255, 255, 0.03); 
      --border: rgba(255, 255, 255, 0.1); 
      --text: #f0ece4; 
      --muted: #888; 
    }
    
    @keyframes pageFade { from { opacity: 0; } to { opacity: 1; } }

    body { 
      background-color: var(--bg-dark);
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      animation: pageFade 0.6s ease-in-out;
      transition: opacity 0.5s ease-in-out;
      overflow-x: hidden;
    }

    .fade-out { opacity: 0; }

    header { 
      position: fixed; top: 0; width: 100%;
      background: rgba(0, 0, 0, 0.2); 
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      padding: 10px 40px; 
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; border-bottom: 1px solid var(--border); 
      z-index: 1000;
    }

    .header-left { display: flex; }
    .back-arrow, .logo { cursor: pointer; transition: 0.3s; }
    .back-arrow { font-size: 20px; color: var(--text); }
    .back-arrow:hover { transform: translateX(-5px); opacity: 0.6; }
    .logo img { height: 78px; width: auto; display: block; }

    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 19px; transition: 0.3s; }
    .header-socials a:hover { color: var(--text); }

    main { padding: 160px 40px 60px; max-width: 1400px; margin: 0 auto; }
    
    .page-title { 
      font-size: 14px; font-weight: 300; letter-spacing: 6px; 
      text-transform: uppercase; margin-bottom: 50px; 
      color: var(--muted); text-align: center;
    }

    .gallery { 
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; 
    }

    .gallery-item { 
      background: var(--glass); border: 1px solid var(--border); border-radius: 15px; 
      overflow: hidden; cursor: zoom-in; position: relative;
      aspect-ratio: 1 / 1.4;
      transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      display: none; /* Hidden by default, shown when img loads */
    }

    .gallery-item:hover { border-color: rgba(255, 255, 255, 0.3); transform: translateY(-8px); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Lightbox UI */
    .lightbox { 
      display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); 
      z-index: 2000; backdrop-filter: blur(8px);
      touch-action: none; overflow: hidden;
    }
    .lightbox.open { display: block; }

    .close-lightbox {
      position: fixed; top: 30px; right: 40px; color: white;
      font-size: 40px; cursor: pointer; opacity: 0.8; transition: 0.3s;
      z-index: 3000; /* Above the image always */
    }

    #lightbox-img { 
      position: absolute;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
      will-change: transform;
    }

    footer { padding: 40px 20px; text-align: center; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); }

    @media (max-width: 800px) { 
      .gallery { grid-template-columns: 1fr; } 
      .logo img { height: 60px; }
      header { padding: 10px 20px; }
      main { padding: 120px 20px 60px; }
      .close-lightbox { top: 20px; right: 25px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left"><a class="back-arrow" onclick="smoothBack()"><i class="fa-solid fa-chevron-left"></i></a></div>
  <div class="logo" onclick="smoothBack()"><img src="../logo.png" alt="Logo"></div>
  <div class="header-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="page-title">Anime Collection</h1>
  <div class="gallery" id="gallery"></div>
</main>

<div class="lightbox" id="lightbox">
  <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img" src="">
</div>

<script>
  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  function smoothBack() {
    document.body.classList.add('fade-out');
    setTimeout(() => { window.location.href = '../index.html'; }, 500);
  }

  // Smart Loader: Only show cards if image exists
  for (let i = 1; i <= 100; i++) {
    const fileName = `${i}.png`;
    const tempImg = new Image();
    tempImg.src = fileName;
    
    tempImg.onload = () => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.style.display = 'block';
      item.innerHTML = `<img src="${fileName}" alt="Print ${i}" loading="lazy">`;
      item.onclick = () => openLightbox(fileName);
      gallery.appendChild(item);
    };
  }

  // --- Pan & Zoom Engine ---
  let evCache = [];
  let prevDiff = -1;
  let scale = 1, lastScale = 1;
  let posX = 0, posY = 0, lastPosX = 0, lastPosY = 0;
  let isDragging = false, startX = 0, startY = 0;

  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    
    lightboxImg.onload = () => {
        scale = 1; posX = 0; posY = 0;
        centerImage();
    };
  }

  function centerImage() {
    const rect = lightbox.getBoundingClientRect();
    const imgRect = lightboxImg.getBoundingClientRect();
    posX = (rect.width - imgRect.width) / 2;
    posY = (rect.height - imgRect.height) / 2;
    updateTransform();
  }

  function updateTransform() {
    lightboxImg.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = 'auto';
  }

  // Touch/Mouse Events for Panning
  lightbox.onpointerdown = (e) => {
    evCache.push(e);
    isDragging = true;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
  };

  lightbox.onpointermove = (e) => {
    handlePinch(e);
    if (isDragging && evCache.length < 2) {
      posX = e.clientX - startX;
      posY = e.clientY - startY;
      updateTransform();
    }
  };

  lightbox.onpointerup = (e) => {
    isDragging = false;
    remove_event(e);
    if (evCache.length < 2) prevDiff = -1;
  };

  function handlePinch(e) {
    for (let i = 0; i < evCache.length; i++) {
      if (e.pointerId == evCache[i].pointerId) {
        evCache[i] = e;
        break;
      }
    }
    if (evCache.length == 2) {
      let curDiff = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
      if (prevDiff > 0) {
        if (curDiff > prevDiff) scale += 0.05;
        if (curDiff < prevDiff && scale > 1) scale -= 0.05;
      }
      prevDiff = curDiff;
      updateTransform();
    }
  }

  function remove_event(e) {
    for (let i = 0; i < evCache.length; i++) {
      if (evCache[i].pointerId == e.pointerId) {
        evCache.splice(i, 1);
        break;
      }
    }
  }

  lightbox.onwheel = (e) => {
    e.preventDefault();
    scale += e.deltaY * -0.001;
    scale = Math.min(Math.max(1, scale), 4);
    updateTransform();
  };
</script>
</body>
</html>
