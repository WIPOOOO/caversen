<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>Anime — Caversen Print</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --bg-dark: #000000;
      --glass: rgba(255, 255, 255, 0.03); 
      --border: rgba(255, 255, 255, 0.1); 
      --text: #f0ece4; 
      --muted: #888; 
    }
    
    @keyframes pageFade { from { opacity: 0; } to { opacity: 1; } }

    body { 
      background-color: var(--bg-dark);
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      animation: pageFade 0.6s ease-in-out;
      transition: opacity 0.5s ease-in-out;
      overflow-x: hidden;
    }

    .fade-out { opacity: 0; }

    header { 
      position: fixed; top: 0; width: 100%;
      background: rgba(0, 0, 0, 0.2); 
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      padding: 10px 40px; 
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; border-bottom: 1px solid var(--border); 
      z-index: 1000;
    }

    .header-left { display: flex; }
    .back-arrow, .logo { cursor: pointer; transition: 0.3s; }
    .back-arrow { font-size: 20px; color: var(--text); }
    .back-arrow:hover { transform: translateX(-5px); opacity: 0.6; }
    .logo img { height: 78px; width: auto; display: block; }

    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 19px; transition: 0.3s; }
    .header-socials a:hover { color: var(--text); }

    main { padding: 160px 40px 60px; max-width: 1400px; margin: 0 auto; }
    
    .page-title { 
      font-size: 14px; font-weight: 300; letter-spacing: 6px; 
      text-transform: uppercase; margin-bottom: 50px; 
      color: var(--muted); text-align: center;
    }

    .gallery { 
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; 
    }

    .gallery-item { 
      background: var(--glass); border: 1px solid var(--border); border-radius: 15px; 
      overflow: hidden; cursor: zoom-in; position: relative;
      aspect-ratio: 1 / 1.4;
      transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .gallery-item:hover { border-color: rgba(255, 255, 255, 0.3); transform: translateY(-8px); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Fix: Zoomable Lightbox */
    .lightbox { 
      display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); 
      z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px);
      overflow: hidden; 
      touch-action: none;
    }
    .lightbox.open { display: flex; }

    /* Image container allows inner zooming without affecting the UI */
    .lightbox-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .lightbox img { 
      max-width: 95vw; 
      max-height: 85vh; 
      object-fit: contain; 
      transition: transform 0.1s ease-out;
      will-change: transform;
    }

    .close-lightbox {
      position: fixed; top: 30px; right: 40px; color: white;
      font-size: 35px; cursor: pointer; opacity: 0.7; transition: 0.3s;
      z-index: 2100;
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    footer { padding: 40px 20px; text-align: center; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); }

    @media (max-width: 800px) { 
      .gallery { grid-template-columns: 1fr; } 
      .logo img { height: 60px; }
      header { padding: 10px 20px; }
      main { padding: 120px 20px 60px; }
      .close-lightbox { top: 20px; right: 25px; font-size: 40px; opacity: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left"><a class="back-arrow" onclick="smoothBack()"><i class="fa-solid fa-chevron-left"></i></a></div>
  <div class="logo" onclick="smoothBack()"><img src="../logo.png" alt="Logo"></div>
  <div class="header-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="page-title">Anime Collection</h1>
  <div class="gallery" id="gallery"></div>
</main>

<div class="lightbox" id="lightbox">
  <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
  <div class="lightbox-content">
    <img id="lightbox-img" src="">
  </div>
</div>

<script>
  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  function smoothBack() {
    document.body.classList.add('fade-out');
    setTimeout(() => { window.location.href = '../index.html'; }, 500);
  }

  // Gallery Loader
  for (let i = 1; i <= 100; i++) {
    const fileName = `${i}.png`;
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = `<img src="${fileName}" alt="Print ${i}" loading="lazy">`;
    item.onclick = () => {
      lightboxImg.src = fileName;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
      resetZoom();
    };
    gallery.appendChild(item);
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = 'auto';
    resetZoom();
  }

  // --- Pinch to Zoom Logic ---
  let scale = 1;
  let pointX = 0;
  let pointY = 0;
  let start = { x: 0, y: 0 };

  function setTransform() {
    lightboxImg.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
  }

  function resetZoom() {
    scale = 1; pointX = 0; pointY = 0;
    setTransform();
  }

  lightbox.onmousedown = (e) => {
    if (e.target !== lightboxImg) return;
    e.preventDefault();
    start = { x: e.clientX - pointX, y: e.clientY - pointY };
    lightbox.onmousemove = (e) => {
      pointX = e.clientX - start.x;
      pointY = e.clientY - start.y;
      setTransform();
    };
  };

  window.onmouseup = () => { lightbox.onmousemove = null; };

  lightbox.onwheel = (e) => {
    e.preventDefault();
    const delta = e.wheelDelta ? e.wheelDelta : -e.deltaY;
    scale = (delta > 0) ? (scale * 1.1) : (scale / 1.1);
    if (scale < 1) scale = 1;
    setTransform();
  };

  // Mobile Touch Support for Zoom
  let initialDist = 0;
  lightbox.ontouchstart = (e) => {
    if (e.touches.length === 2) {
      initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
    }
  };

  lightbox.ontouchmove = (e) => {
    if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
      scale = (dist / initialDist);
      if (scale < 1) scale = 1;
      setTransform();
    }
  };

  // Close on background click
  lightbox.onclick = (e) => { if (e.target === lightbox || e.target.className === 'lightbox-content') closeLightbox(); };
</script>
</body>
</html>
