<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anime — Caversen Print</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #c8a97e;
      --text: #f0ece4;
      --muted: #5a5550;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }
    header {
      position: relative;
      z-index: 1;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .back {
      text-decoration: none;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back:hover { color: var(--text); }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }
    main {
      padding: 50px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 8vw, 96px);
      margin-bottom: 48px;
      text-transform: uppercase;
    }
    .gallery {
      columns: 3;
      column-gap: 20px;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 20px;
      background: var(--surface);
      cursor: zoom-in;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .gallery-item img {
      width: 100%;
      display: block;
      height: auto;
      transition: transform 0.4s;
    }
    .gallery-item:hover img {
      transform: scale(1.05);
    }
    footer {
      padding: 40px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-socials { display: flex; gap: 20px; }
    .footer-socials a { color: var(--muted); font-size: 20px; transition: 0.3s; }
    .footer-socials a:hover { color: var(--accent); }
    
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
    
    @media (max-width: 800px) { .gallery { columns: 2; } }
    @media (max-width: 500px) { .gallery { columns: 1; } }
  </style>
</head>
<body>

<header>
  <a class="back" href="../index.html">← All Collections</a>
  <a class="logo" href="../index.html">Caversen<span>.</span>Print</a>
</header>

<main>
  <h1 class="page-title">Anime</h1>
  <div class="gallery">
    
    <div class="gallery-item" onclick="openLightbox(this)">
      <img src="1.png" alt="Anime 01">
    </div>

    <div class="gallery-item" onclick="openLightbox(this)">
      <img src="2.png" alt="Anime 02">
    </div>

    </div>
</main>

<footer>
  <p>© 2025 Caversen Print</p>
  <div class="footer-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</footer>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="">
</div>

<script>
  function openLightbox(item) {
    const imgUrl = item.querySelector('img').src;
    document.getElementById('lightbox-img').src = imgUrl;
    document.getElementById('lightbox').classList.add('open');
  }
</script>

</body>
</html>
