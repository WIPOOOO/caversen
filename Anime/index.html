<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anime — Caversen Print</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e; --accent: #c8a97e; --text: #f0ece4; --muted: #888; }
    
    html, body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      min-height: 100vh; 
    }
    
    header { 
      position: sticky; top: 0; z-index: 100; background: var(--bg);
      padding: 15px 40px; 
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center; 
      border-bottom: 1px solid var(--border); 
    }

    /* Column 1: Clean Back Button */
    .back { 
      text-decoration: none; 
      color: var(--muted); 
      font-size: 11px; 
      letter-spacing: 2px; 
      text-transform: uppercase; 
      transition: color 0.2s; 
      display: flex;
      align-items: center;
    }
    .back:hover { color: var(--text); }

    /* Column 2: Centered Logo */
    .logo { display: flex; justify-content: center; text-decoration: none; }
    .logo img { height: 50px; width: auto; }

    /* Column 3: Social Icons */
    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 18px; transition: 0.3s; text-decoration: none; }
    .header-socials a:hover { color: var(--text); }

    main { padding: 60px 40px; max-width: 1200px; margin: 0 auto; }
    
    .page-title { 
      font-size: 22px; 
      font-weight: 400; 
      letter-spacing: 4px; 
      text-transform: uppercase; 
      margin-bottom: 50px; 
      color: var(--text);
    }

    .gallery { columns: 3; column-gap: 20px; }
    .gallery-item { break-inside: avoid; margin-bottom: 20px; background: var(--surface); cursor: zoom-in; border: 1px solid var(--border); overflow: hidden; }
    .gallery-item img { width: 100%; display: block; transition: transform 0.4s; }
    .gallery-item:hover img { transform: scale(1.05); }

    footer { padding: 40px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); letter-spacing: 1px; }

    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }

    @media (max-width: 800px) { .gallery { columns: 2; } }
    @media (max-width: 600px) { 
      header { padding: 15px 20px; }
      .back { font-size: 9px; letter-spacing: 1px; }
      .gallery { columns: 1; }
    }
  </style>
</head>
<body>

<header>
  <a class="back" href="../index.html">← Back</a>
  
  <a class="logo" href="../index.html">
    <img src="../logo.png" alt="Logo">
  </a>
  
  <div class="header-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="page-title">Anime</h1>
  <div class="gallery" id="gallery"></div>
</main>

<footer>
  <p>© 2025 Caversen Print</p>
</footer>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="">
</div>

<script>
  const gallery = document.getElementById('gallery');
  const maxImages = 100; 

  for (let i = 1; i <= maxImages; i++) {
    const img = new Image();
    const fileName = `${i}.png`;
    img.src = fileName;
    
    img.onload = function() {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.onclick = function() { openLightbox(fileName); };
      item.innerHTML = `<img src="${fileName}" alt="Print ${i}" loading="lazy">`;
      gallery.appendChild(item);
    };
  }

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
</script>

</body>
</html>
