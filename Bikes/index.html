<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bikes — Caversen Print</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --bg-dark: #000000;
      --glass: rgba(255, 255, 255, 0.03); 
      --glass-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1); 
      --text: #f0ece4; 
      --muted: #888; 
    }
    
    /* Smooth Cross-Fade Animation */
    @keyframes pageEnter {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    body { 
      background-color: var(--bg-dark);
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      line-height: 1.6;
      animation: pageEnter 0.6s ease-in-out;
      overflow-x: hidden;
    }

    header { 
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.2); 
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 10px 40px; 
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center; 
      border-bottom: 1px solid var(--border); 
      z-index: 1000;
    }

    .back-arrow { 
      text-decoration: none; 
      color: var(--text); 
      font-size: 20px; 
      display: flex;
      align-items: center;
      width: fit-content;
      transition: 0.3s;
    }
    
    .back-arrow:hover { transform: translateX(-5px); opacity: 0.6; }

    .logo img { height: 78px; width: auto; display: block; }

    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 19px; transition: 0.3s; text-decoration: none; }
    .header-socials a:hover { color: var(--text); }

    main { 
      padding: 160px 40px 60px; 
      max-width: 1400px; 
      margin: 0 auto; 
    }
    
    .page-title { 
      font-size: 14px; 
      font-weight: 300; 
      letter-spacing: 6px; 
      text-transform: uppercase; 
      margin-bottom: 50px; 
      color: var(--muted);
      text-align: center;
    }

    .gallery { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 20px; 
    }

    .gallery-item { 
      background: var(--glass); 
      border: 1px solid var(--border); 
      border-radius: 15px; 
      backdrop-filter: blur(10px);
      overflow: hidden;
      cursor: zoom-in;
      transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .gallery-item:hover { 
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.7);
    }

    .gallery-item img { width: 100%; display: block; }
    
    footer { 
      padding: 40px 20px; 
      text-align: center;
      font-size: 10px; 
      color: var(--muted); 
      letter-spacing: 2.5px; 
      border-top: 1px solid var(--border);
    }

    @media (max-width: 800px) { 
        .gallery { grid-template-columns: repeat(2, 1fr); }
        header { padding: 10px 20px; }
        .logo img { height: 60px; }
        main { padding-top: 130px; }
    }
    @media (max-width: 500px) { .gallery { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <a class="back-arrow" href="../index.html"><i class="fa-solid fa-chevron-left"></i></a>
  <a class="logo" href="../index.html">
    <img src="../logo.png" alt="Logo">
  </a>
  <div class="header-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="page-title">Bikes Collection</h1>
  <div class="gallery" id="gallery"></div>
</main>

<footer>
  <p>© 2026 CAVERSEN PRINT — MOROCCO</p>
</footer>

<script>
  // Dynamic Gallery Loading
  const gallery = document.getElementById('gallery');
  const maxImages = 100; 

  for (let i = 1; i <= maxImages; i++) {
    const fileName = `${i}.png`;
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = `<img src="${fileName}" alt="Print ${i}" loading="lazy">`;
    
    const imgTest = new Image();
    imgTest.src = fileName;
    imgTest.onload = () => gallery.appendChild(item);
  }
</script>

</body>
</html>
