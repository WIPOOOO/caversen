<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caversen Print — High Quality Wall Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e; --accent: #c8a97e; --text: #f0ece4; --muted: #5a5550; }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    
    header { 
      position: sticky; 
      top: 0; 
      z-index: 100; 
      background: var(--bg);
      padding: 20px 40px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      border-bottom: 1px solid var(--border); 
    }

    .logo { display: flex; align-items: center; text-decoration: none; }
    .logo img { height: 65px; width: auto; }

    main { padding: 50px 40px; max-width: 1200px; margin: 0 auto; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 6vw, 70px); margin-bottom: 40px; }

    .collection-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
      gap: 20px; 
    }

    .card { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      padding: 30px; 
      text-decoration: none; 
      color: var(--text); 
      transition: 0.3s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-5px); }
    .card h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; }
    .card p { color: var(--muted); font-size: 12px; text-transform: uppercase; margin-top: 5px; }

    footer { padding: 40px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .footer-socials { display: flex; gap: 20px; }
    .footer-socials a { color: var(--muted); font-size: 20px; transition: 0.3s; text-decoration: none; }
    .footer-socials a:hover { color: var(--accent); }

    @media (max-width: 600px) { header { padding: 15px 20px; } main { padding: 30px 20px; } footer { flex-direction: column; gap: 20px; text-align: center; } }
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <img src="logo.png" alt="Caversen Print Logo">
  </a>
  <div class="footer-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="hero-title">Browse Collections</h1>
  <div class="collection-grid">
    <a href="Anime/index.html" class="card"><h2>Anime</h2><p>View Collection</p></a>
    <a href="Bikes/index.html" class="card"><h2>Bikes</h2><p>View Collection</p></a>
    <a href="Cars/index.html" class="card"><h2>Cars</h2><p>View Collection</p></a>
    <a href="Football/index.html" class="card"><h2>Football</h2><p>View Collection</p></a>
    <a href="Gaming/index.html" class="card"><h2>Gaming</h2><p>View Collection</p></a>
    <a href="Islam/index.html" class="card"><h2>Islam</h2><p>View Collection</p></a>
    <a href="Movies/index.html" class="card"><h2>Movies</h2><p>View Collection</p></a>
    <a href="Quotes/index.html" class="card"><h2>Quotes</h2><p>View Collection</p></a>
  </div>
</main>

<footer>
  <p>© 2025 Caversen Print — Morocco</p>
</footer>

</body>
</html>
