<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caversen Print — High Quality Wall Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --bg-dark: #000000; /* Pure black bg */
      --purple-orb: #3d0a63; /* Blurred orb color */
      --glass: rgba(255, 255, 255, 0.03); /* Base glass box color */
      --glass-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08); /* Minimal glass edge */
      --accent: #c8a97e; 
      --text: #f0ece4; 
      --muted: #888; 
    }
    
    /* Lock layout and add animated blurred purple orb background */
    html, body { 
      height: 100%;
      margin: 0;
      overflow: hidden; /* Lock desktop scroll */
      background: var(--bg-dark);
      position: relative;
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      display: flex;
      flex-direction: column;
    }

    /* Moving Blurred Orb Mechanism */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, var(--purple-orb) 0%, rgba(0,0,0,0) 60%);
      filter: blur(120px); /* Creates the moving blured circle */
      animation: orbMovement 20s ease-in-out infinite;
      z-index: -1;
      opacity: 0.6; /* Subtle effect */
    }

    @keyframes orbMovement {
      0%, 100% { transform: translate(0%, 0%) scale(1); }
      25% { transform: translate(-10%, 15%) scale(1.1); }
      50% { transform: translate(15%, -10%) scale(0.95); }
      75% { transform: translate(-5%, -15%) scale(1.05); }
    }
    
    header { 
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px); /* Blurred glass header */
      padding: 10px 40px; 
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center; 
      border-bottom: 1px solid var(--border); 
      z-index: 10;
    }

    .logo img { height: 48px; width: auto; }
    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 19px; transition: 0.3s; text-decoration: none; }
    .header-socials a:hover { color: var(--text); }

    main { 
      flex: 1;
      padding: 20px 40px; 
      max-width: 1400px; 
      margin: 0 auto; 
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 5;
    }
    
    .hero-title { 
      font-size: 17px; 
      font-weight: 300; 
      letter-spacing: 5.5px; 
      text-transform: uppercase; 
      margin-bottom: 30px; 
      color: var(--muted);
      text-align: center;
    }

    .collection-grid { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 18px; 
    }

    /* Cleaned Up Rounded Glass Boxes */
    .card { 
      background: var(--glass); 
      border: 1px solid var(--border); 
      border-radius: 20px; /* Rounded corners */
      backdrop-filter: blur(15px); /* Strong internal glass blur */
      aspect-ratio: 1.15 / 1; /* Keep boxes consistent */
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none; 
      color: var(--text); 
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      overflow: hidden;
    }

    /* Subtler Hover (removed Explore text entirely as requested previously) */
    .card:hover { 
      border-color: rgba(200, 169, 126, 0.3); 
      background: var(--glass-hover);
      transform: translateY(-6px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Modern drop shadow */
    }
    
    /* Collection text (big and bold as optimized previously) */
    .card h2 { 
      font-size: 1.25vw; /* Perfectly scaled on desktop */
      font-weight: 700; 
      letter-spacing: 2.5px; 
      text-transform: uppercase; 
      text-shadow: 0 2px 4px rgba(0,0,0,0.5); /* Text depth */
    }

    footer { 
      flex-shrink: 0;
      padding: 18px; 
      text-align: center;
      font-size: 11.5px; 
      color: var(--muted); 
      letter-spacing: 2.5px; 
      border-top: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.4);
      z-index: 10;
    }
    
    /* Small screen optimizations (Keep scroll and adapt grid) */
    @media (max-width: 800px) {
      body { overflow-y: auto; height: auto; }
      body::before { opacity: 0.4; filter: blur(100px); }
      header { padding: 15px 20px; }
      .logo img { height: 42px; }
      .collection-grid { grid-template-columns: 1fr; gap: 12px; }
      .card { aspect-ratio: 2.5 / 1; border-radius: 12px; backdrop-filter: blur(8px); }
      .card h2 { font-size: 19px; letter-spacing: 2px; }
      main { padding: 30px 20px; justify-content: flex-start; }
      .hero-title { margin-top: 20px; font-size: 14px; margin-bottom: 25px; }
      footer { font-size: 10.5px; }
    }
  </style>
</head>
<body>

<header>

  <a class="logo" href="index.html">

  </a>
  <div class="header-socials">

    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>

<main>
  <h1 class="hero-title">Curated Collections</h1>
  <div class="collection-grid">
    <a href="Anime/index.html" class="card"><h2>Anime</h2></a>
    <a href="Bikes/index.html" class="card"><h2>Bikes</h2></a>
    <a href="Cars/index.html" class="card"><h2>Cars</h2></a>
    <a href="Football/index.html" class="card"><h2>Football</h2></a>
    <a href="Gaming/index.html" class="card"><h2>Gaming</h2></a>
    <a href="Islam/index.html" class="card"><h2>Islam</h2></a>
    <a href="Movies/index.html" class="card"><h2>Movies</h2></a>
    <a href="Quotes/index.html" class="card"><h2>Quotes</h2></a>
  </div>
</main>

<footer>
  <p>© 2026 CAVERSEN PRINT — CASABLANCA</p>
</footer>

</body>
</html>
