<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caversen Print — High Quality Wall Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e; --accent: #c8a97e; --text: #f0ece4; --muted: #888; }
    
    html, body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      min-height: 100vh; 
    }
    
    header { 
      position: sticky; top: 0; z-index: 100; background: var(--bg);
      padding: 15px 40px; 
      display: grid; /* Changed to Grid for perfect centering */
      grid-template-columns: 1fr auto 1fr; 
      align-items: center; 
      border-bottom: 1px solid var(--border); 
    }

    /* Column 1: Empty spacer */
    .header-spacer { display: block; }

    /* Column 2: Centered Logo */
    .logo { display: flex; justify-content: center; text-decoration: none; }
    .logo img { height: 50px; width: auto; }

    /* Column 3: Social Icons on the right */
    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 18px; transition: 0.3s; text-decoration: none; }
    .header-socials a:hover { color: var(--text); }

    main { padding: 60px 40px; max-width: 1200px; margin: 0 auto; }
    
    .hero-title { 
      font-size: 22px; 
      font-weight: 400; 
      letter-spacing: 4px; 
      text-transform: uppercase; 
      margin-bottom: 50px; 
      color: var(--text);
    }

    .collection-grid { 
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; 
    }

    .card { 
      background: var(--surface); border: 1px solid var(--border); 
      padding: 40px 30px; text-decoration: none; color: var(--text); 
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    .card:hover { border-color: var(--accent); transform: translateY(-5px); background: #161616; }
    
    .card h2 { 
      font-size: 20px; 
      font-weight: 600; 
      letter-spacing: 2px; 
      text-transform: uppercase; 
    }
    .card p { color: var(--muted); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }

    footer { padding: 40px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); letter-spacing: 1px; }
    
    @media (max-width: 600px) { 
      header { padding: 15px 20px; }
      .header-socials { gap: 15px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-spacer"></div> <a class="logo" href="index.html">
    <img src="logo.png" alt="Logo">
  </a>
  
  <div class="header-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="hero-title">Browse Collections</h1>
  <div class="collection-grid">
    <a href="Anime/index.html" class="card"><h2>Anime</h2><p>Explore</p></a>
    <a href="Bikes/index.html" class="card"><h2>Bikes</h2><p>Explore</p></a>
    <a href="Cars/index.html" class="card"><h2>Cars</h2><p>Explore</p></a>
    <a href="Football/index.html" class="card"><h2>Football</h2><p>Explore</p></a>
    <a href="Gaming/index.html" class="card"><h2>Gaming</h2><p>Explore</p></a>
    <a href="Islam/index.html" class="card"><h2>Islam</h2><p>Explore</p></a>
    <a href="Movies/index.html" class="card"><h2>Movies</h2><p>Explore</p></a>
    <a href="Quotes/index.html" class="card"><h2>Quotes</h2><p>Explore</p></a>
  </div>
</main>

<footer>
  <p>© 2025 Caversen Print — Morocco</p>
</footer>

</body>
</html>
