<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caversen Print — High Quality Wall Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      /* Even darker, richer purples to ensure elegance */
      --purple-dark: #120121;
      --purple-deep: #08000f;
      --glass: rgba(255, 255, 255, 0.03); 
      --glass-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1); 
      --text: #f0ece4; 
      --muted: #888; 
    }
    
    html, body { 
      height: 100%;
      margin: 0;
      overflow: hidden; 
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      display: flex;
      flex-direction: column;

      /* FORCED GRADIENT: This creates a moving "sweep" of dark purple */
      background: linear-gradient(45deg, #000000, var(--purple-deep), #000000, var(--purple-dark));
      background-size: 400% 400%;
      animation: gradientSweep 12s ease infinite;
    }

    @keyframes gradientSweep {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    header { 
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(15px);
      padding: 10px 40px; 
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center; 
      border-bottom: 1px solid var(--border); 
      z-index: 10;
    }

    .logo img { height: 48px; width: auto; }
    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 19px; transition: 0.3s; text-decoration: none; }
    .header-socials a:hover { color: var(--text); }

    main { 
      flex: 1;
      padding: 20px 40px; 
      max-width: 1400px; 
      margin: 0 auto; 
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 5;
    }
    
    .hero-title { 
      font-size: 17px; 
      font-weight: 300; 
      letter-spacing: 5.5px; 
      text-transform: uppercase; 
      margin-bottom: 30px; 
      color: var(--muted);
      text-align: center;
    }

    .collection-grid { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 18px; 
    }

    .card { 
      background: var(--glass); 
      border: 1px solid var(--border); 
      border-radius: 20px; 
      backdrop-filter: blur(20px); 
      aspect-ratio: 1.15 / 1; 
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none; 
      color: var(--text); 
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .card:hover { 
      border-color: rgba(255, 255, 255, 0.3); 
      background: var(--glass-hover);
      transform: translateY(-6px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .card h2 { 
      font-size: 1.25vw; 
      font-weight: 700; 
      letter-spacing: 2.5px; 
      text-transform: uppercase; 
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }

    footer { 
      flex-shrink: 0;
      padding: 18px; 
      text-align: center;
      font-size: 11.5px; 
      color: var(--muted); 
      letter-spacing: 2.5px; 
      border-top: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.5);
      z-index: 10;
    }
    
    @media (max-width: 800px) {
      body { overflow-y: auto; height: auto; }
      header { padding: 15px 20px; }
      .collection-grid { grid-template-columns: 1fr; gap: 12px; }
      .card { aspect-ratio: 2.5 / 1; border-radius: 12px; }
      .card h2 { font-size: 19px; }
      main { padding: 30px 20px; justify-content: flex-start; }
      .hero-title { margin-top: 20px; font-size: 14px; }
    }
  </style>
</head>
<body>

<header>
  <div></div>
  <a class="logo" href="index.html">
    <img src="logo.png" alt="Logo">
  </a>
  <div class="header-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="hero-title">Our Collections</h1>
  <div class="collection-grid">
    <a href="Anime/index.html" class="card"><h2>Anime</h2></a>
    <a href="Bikes/index.html" class="card"><h2>Bikes</h2></a>
    <a href="Cars/index.html" class="card"><h2>Cars</h2></a>
    <a href="Football/index.html" class="card"><h2>Football</h2></a>
    <a href="Gaming/index.html" class="card"><h2>Gaming</h2></a>
    <a href="Islam/index.html" class="card"><h2>Islam</h2></a>
    <a href="Movies/index.html" class="card"><h2>Movies</h2></a>
    <a href="Quotes/index.html" class="card"><h2>Quotes</h2></a>
  </div>
</main>

<footer>
  <p>© 2026 CAVERSEN PRINT — MOROCCO</p>
</footer>

</body>
</html>
