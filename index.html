<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caversen Print — High Quality Wall Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --bg-dark: #000000;
      --glass: rgba(255, 255, 255, 0.03); 
      --glass-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1); 
      --text: #f0ece4; 
      --muted: #888; 
    }
    
    html, body { 
      height: 100%;
      background-color: var(--bg-dark);
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header { 
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      padding: 10px 40px; 
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center; 
      border-bottom: 1px solid var(--border); 
      z-index: 10;
    }

    .logo img { height: 78px; width: auto; }
    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 19px; transition: 0.3s; text-decoration: none; }
    .header-socials a:hover { color: var(--text); }

    main { 
      flex: 1;
      padding: 40px 20px; 
      max-width: 1400px; 
      margin: 0 auto; 
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .hero-title { 
      font-size: 17px; 
      font-weight: 300; 
      letter-spacing: 5.5px; 
      text-transform: uppercase; 
      margin-bottom: 40px; 
      color: var(--muted);
      text-align: center;
    }

    .collection-grid { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 20px; 
    }

    .card { 
      background: var(--glass); 
      border: 1px solid var(--border); 
      border-radius: 20px; 
      aspect-ratio: 1.15 / 1; 
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none; 
      color: var(--text); 
      transition: all 0.4s ease;
    }

    .card:hover { 
      background: var(--glass-hover);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-5px);
    }
    
    .card h2 { 
      font-size: 1.2rem; 
      font-weight: 600; 
      letter-spacing: 2px; 
      text-transform: uppercase; 
    }

    footer { 
      padding: 20px; 
      text-align: center;
      font-size: 11px; 
      color: var(--muted); 
      letter-spacing: 2.5px; 
      border-top: 1px solid var(--border);
    }
    
    @media (max-width: 900px) {
      .collection-grid { grid-template-columns: repeat(2, 1fr); }
      .card h2 { font-size: 1rem; }
    }

    @media (max-width: 500px) {
      header { padding: 10px 20px; }
      .collection-grid { grid-template-columns: 1fr; }
      .card { aspect-ratio: 2 / 1; }
    }
  </style>
</head>
<body>

<header>
  <div></div>
  <a class="logo" href="index.html">
    <img src="logo.png" alt="Logo">
  </a>
  <div class="header-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="hero-title">Our Collections</h1>
  <div class="collection-grid">
    <a href="Anime/index.html" class="card"><h2>Anime</h2></a>
    <a href="Bikes/index.html" class="card"><h2>Bikes</h2></a>
    <a href="Cars/index.html" class="card"><h2>Cars</h2></a>
    <a href="Football/index.html" class="card"><h2>Football</h2></a>
    <a href="Gaming/index.html" class="card"><h2>Gaming</h2></a>
    <a href="Islam/index.html" class="card"><h2>Islam</h2></a>
    <a href="Movies/index.html" class="card"><h2>Movies</h2></a>
    <a href="Quotes/index.html" class="card"><h2>Quotes</h2></a>
  </div>
</main>

<footer>
  <p>© 2026 CAVERSEN PRINT — MOROCCO</p>
</footer>

</body>
</html>
